# /etc/nginx/sites-available/intermtnroofing.com
# Enable: ln -s /etc/nginx/sites-available/intermtnroofing.com /etc/nginx/sites-enabled/
# SSL lines are added automatically by: sudo certbot --nginx -d intermtnroofing.com -d www.intermtnroofing.com

server {
    listen 80;
    server_name intermtnroofing.com www.intermtnroofing.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name intermtnroofing.com www.intermtnroofing.com;

    root /var/www/intermtnroofing.com/current;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SSL certificate lines are managed by Certbot — do not edit manually
}
