name: Deploy intermtnroofing.com to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: intermtnroofing-ionos-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IONOS_HOST: ${{ vars.IONOS_HOST }}
      IONOS_USER: ${{ vars.IONOS_USER }}
      IONOS_PORT: ${{ vars.IONOS_PORT || '22' }}
      # Set IONOS_PATH_INTERMTN in GitHub Actions repo variables:
      # /var/www/intermtnroofing.com/current
      IONOS_PATH: ${{ vars.IONOS_PATH_INTERMTN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: BRAND=intermtnroofing npm run apply:brand

      - run: npm run build:css

      - run: |
          test -n "$IONOS_HOST" || { echo "Missing IONOS_HOST GitHub Actions variable"; exit 1; }
          test -n "$IONOS_USER" || { echo "Missing IONOS_USER GitHub Actions variable"; exit 1; }
          test -n "$IONOS_PATH" || { echo "Missing IONOS_PATH_INTERMTN GitHub Actions variable"; exit 1; }

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.IONOS_SSH_KEY }}

      - run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$IONOS_PORT" "$IONOS_HOST" >> ~/.ssh/known_hosts

      - run: |
          ssh -p "$IONOS_PORT" "$IONOS_USER@$IONOS_HOST" "mkdir -p \"$IONOS_PATH\""

      - run: |
          rsync -rlptDz --delete --delete-excluded -e "ssh -p $IONOS_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".gitignore" \
            --exclude ".prettierrc" \
            --exclude "node_modules/" \
            --exclude "scripts/" \
            --exclude "brands/" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "postcss.config.js" \
            --exclude "tailwind.config.js" \
            --exclude "README.md" \
            ./ "$IONOS_USER@$IONOS_HOST:$IONOS_PATH/"
