name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: roofrx-ionos-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IONOS_HOST: ${{ vars.IONOS_HOST }}           # kept for rollback reference; CI now uses IONOS_TAILSCALE_IP
      IONOS_TAILSCALE_IP: ${{ vars.IONOS_TAILSCALE_IP }}
      IONOS_USER: ${{ vars.IONOS_USER }}
      IONOS_PORT: ${{ vars.IONOS_PORT || '22' }}
      IONOS_PATH: ${{ vars.IONOS_PATH }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: BRAND=roofrxservices npm run apply:brand

      - run: npm run build:css

      - run: docker build -t roofrx:test .

      - run: |
          test -n "$IONOS_TAILSCALE_IP" || { echo "Missing IONOS_TAILSCALE_IP GitHub Actions variable"; exit 1; }
          test -n "$IONOS_USER" || { echo "Missing IONOS_USER GitHub Actions variable"; exit 1; }
          test -n "$IONOS_PATH" || { echo "Missing IONOS_PATH GitHub Actions variable"; exit 1; }

      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.IONOS_SSH_KEY }}

      - run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$IONOS_PORT" "$IONOS_TAILSCALE_IP" >> ~/.ssh/known_hosts

      - run: |
          ssh -p "$IONOS_PORT" "$IONOS_USER@$IONOS_TAILSCALE_IP" "mkdir -p \"$IONOS_PATH\""

      - run: |
          rsync -rlptDz --delete --delete-excluded -e "ssh -p $IONOS_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".gitignore" \
            --exclude ".prettierrc" \
            --exclude "node_modules/" \
            --exclude "scripts/" \
            --exclude "brands/" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "postcss.config.js" \
            --exclude "tailwind.config.js" \
            --exclude "README.md" \
            ./ "$IONOS_USER@$IONOS_TAILSCALE_IP:$IONOS_PATH/"
