name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild generated assets
        run: |
          npm run build:css
          npm run content:scan

      - name: Verify generated files are committed
        run: git diff --exit-code -- css/pages content/pages-index.json content/editable.json
