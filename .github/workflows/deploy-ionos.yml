name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: roofrx-ionos-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IONOS_HOST: ${{ vars.IONOS_HOST }}
      IONOS_USER: ${{ vars.IONOS_USER }}
      IONOS_PORT: ${{ vars.IONOS_PORT || '22' }}
      IONOS_PATH: ${{ vars.IONOS_PATH }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build:css

      - run: docker build -t roofrx:test .

      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.IONOS_SSH_KEY }}

      - run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$IONOS_PORT" "$IONOS_HOST" >> ~/.ssh/known_hosts

      - run: |
          ssh -p "$IONOS_PORT" "$IONOS_USER@$IONOS_HOST" "mkdir -p \"$IONOS_PATH\""

      - run: |
          rsync -rlptDz --delete --delete-excluded -e "ssh -p $IONOS_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".gitignore" \
            --exclude ".prettierrc" \
            --exclude "node_modules/" \
            --exclude "scripts/" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "postcss.config.js" \
            --exclude "tailwind.config.js" \
            --exclude "README.md" \
            ./ "$IONOS_USER@$IONOS_HOST:$IONOS_PATH/"
