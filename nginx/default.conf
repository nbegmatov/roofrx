server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ =404;
  }

  location = /favicon.ico {
    log_not_found off;
    access_log off;
  }

  location ~* \.(css|js|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location ~* \.html$ {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }
}
